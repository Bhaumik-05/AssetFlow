{% extends 'base.html' %}
{% block title %}Categories | AssetFlow{% endblock %}
{% block content %}
  <div class="card">
    <h2>Asset Categories</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          {% for category in categories %}
            <tr>
              <td>{{ category.name }}</td>
              <td>{{ category.description|default:'-' }}</td>
            </tr>
          {% empty %}
            <tr><td colspan="2">No categories found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
